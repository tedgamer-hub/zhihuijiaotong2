# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/intellidetect?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server Configuration
server.port=8080
server.servlet.context-path=/IntelliDetect

# IoTDA Configuration
iotda.region-id=${IOTDA_REGION_ID:cn-north-4}
iotda.endpoint=${IOTDA_ENDPOINT:}
iotda.ak=${IOTDA_ACCESS_KEY:}
iotda.sk=${IOTDA_SECRET_KEY:}
iotda.project-id=${IOTDA_PROJECT_ID:}
iotda.device-id=${IOTDA_DEVICE_ID:}
